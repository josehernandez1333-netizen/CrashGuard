<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrashGuard Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#fff;padding:20px}
        .container{width:95%;margin:auto}
        h1{text-align:center;margin-bottom:20px;color:#38bdf8;font-size:40px}
        h2{margin-bottom:15px;color:#e2e8f0}
        .alerta{
            display:none;background:#dc2626;padding:18px;font-size:24px;font-weight:bold;
            text-align:center;border-radius:12px;margin-bottom:25px;animation:parpadeo 1s infinite;
            box-shadow:0 0 20px rgba(255,0,0,.5)
        }
        @keyframes parpadeo{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
        .config{
            background:#1e293b;padding:25px;border-radius:15px;margin-bottom:30px;
            box-shadow:0 0 15px rgba(0,0,0,.3)
        }
        .inputs{display:flex;gap:10px;flex-wrap:wrap}
        input{
            flex:1;min-width:250px;padding:12px;border:none;border-radius:10px;
            background:#334155;color:#fff;font-size:15px
        }
        input::placeholder{color:#cbd5e1}
        button{
            padding:12px 20px;border:none;border-radius:10px;background:#0ea5e9;color:#fff;
            cursor:pointer;font-weight:bold;transition:.3s
        }
        button:hover{background:#0284c7}
        .tabla-container{
            background:#1e293b;padding:20px;border-radius:15px;overflow-x:auto;
            box-shadow:0 0 15px rgba(0,0,0,.3)
        }
        table{width:100%;border-collapse:collapse}
        th{background:#0f172a;color:#38bdf8;padding:15px;font-size:15px}
        td{padding:12px;border-bottom:1px solid #334155;text-align:center}
        tr:hover{background:#273449}
        a{color:#38bdf8;text-decoration:none;font-weight:bold}
        a:hover{text-decoration:underline}
        .estado-online{text-align:center;margin-bottom:25px;color:#4ade80;font-weight:bold}
        .pendiente{color:#fbbf24;font-weight:bold}
    </style>
</head>
<body>
<div class="container">

    <h1>🪖 CrashGuard Dashboard</h1>

    <div class="estado-online">
        Sistema de monitoreo activo
    </div>

    <div class="alerta" id="alerta">🚨 ACCIDENTE DETECTADO 🚨</div>

    <div class="config">
        <h2>⚙️ Configuración del Sistema</h2>
        <div class="inputs">
            <input type="text" id="numero" placeholder="Número destino">
            <input type="text" id="mensaje" placeholder="Mensaje de alerta">
            <button onclick="guardarConfig()">Guardar Configuración</button>
        </div>
    </div>

    <div class="tabla-container">
        <h2>📊 Últimas Alertas</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Event ID</th>
                    <th>Latitud</th>
                    <th>Longitud</th>
                    <th>Magnitud</th>
                    <th>Fecha</th>
                    <th>Mapa</th>
                    <th>Video</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>

</div>

<script>
let ultimaId = 0;
let estadoVideos = {};

function mostrarAlerta(mensaje) {
    const alerta = document.getElementById("alerta");
    alerta.textContent = mensaje;
    alerta.style.display = "block";
    setTimeout(() => { alerta.style.display = "none"; }, 5000);
}

function cargarDatos() {
    fetch('/api/datos')
    .then(res => res.json())
    .then(data => {
        let tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        data.forEach(d => {
            const idActual = Number(d.id);
            const tieneVideo = !!d.video_url;

            if (idActual > ultimaId) {
                mostrarAlerta("🚨 ACCIDENTE DETECTADO 🚨");
                ultimaId = idActual;
            }

            if (Object.prototype.hasOwnProperty.call(estadoVideos, idActual)) {
                if (estadoVideos[idActual] === false && tieneVideo === true) {
                    mostrarAlerta("🎥 VIDEO DISPONIBLE 🚨");
                }
            }

            estadoVideos[idActual] = tieneVideo;

            const videoHtml = tieneVideo
                ? `<a href="${d.video_url}" target="_blank" rel="noopener noreferrer">Ver video</a>`
                : `<span class="pendiente">Video pendiente</span>`;

            const fila = `
                <tr>
                    <td>${d.id}</td>
                    <td>${d.event_id ?? ''}</td>
                    <td>${d.lat}</td>
                    <td>${d.lon}</td>
                    <td>${d.magnitud}</td>
                    <td>${d.fecha}</td>
                    <td>
                        <a href="https://maps.google.com/?q=${d.lat},${d.lon}" target="_blank" rel="noopener noreferrer">
                            Ver mapa
                        </a>
                    </td>
                    <td>${videoHtml}</td>
                </tr>
            `;
            tabla.innerHTML += fila;
        });
    });
}

function cargarConfig() {
    fetch('/api/config')
    .then(res => res.json())
    .then(data => {
        document.getElementById("numero").value = data.numero_destino;
        document.getElementById("mensaje").value = data.mensaje_alerta;
    });
}

function guardarConfig() {
    let numero = document.getElementById("numero").value;
    let mensaje = document.getElementById("mensaje").value;

    fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numero: numero, mensaje: mensaje })
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ Configuración guardada");
    });
}

setInterval(cargarDatos, 3000);
cargarDatos();
cargarConfig();
</script>
</body>
</html>
